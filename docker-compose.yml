services:
  back:
    build:
      context: ./BACK
    ports:
      - "8083:8083"
    networks:
      - batchcooking_network
    #environment:
     # - JWT_SECRET=${JWT_SECRET}
      #- JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS}

  batch:
    build:
      context: ./BATCH
    ports:
      - "5001:5001"
    env_file:
      - ./BATCH/.env
    networks:
      - batchcooking_network
    depends_on:
      - back
      
  front:
    build:
      context: ./FRONT
    ports:
      - "5173:80"
    networks:
      - batchcooking_network
    depends_on:
      - back

networks:
  batchcooking_network:
    driver: bridge
