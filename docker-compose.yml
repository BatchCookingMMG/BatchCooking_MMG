services:
  front:
    build:
      context: ./front # Chemin relatif vers le dossier contenant le Dockerfile du front
    ports:
      - "3000:80" # Mappe le port 80 du conteneur sur le port 3000 de ta machine
    depends_on:
      - back # S'assurer que le back est prêt avant de lancer le front
    environment:
      - REACT_APP_API_URL=http://back:8083

  back:
    build:
      context: ./back # Chemin relatif vers le dossier contenant le Dockerfile du back
    ports:
      - "8083:8083" # Mappe le port 8081 du conteneur sur le port 8081 de ta machine
    environment:
      SPRING_PROFILES_ACTIVE: dev # Exemple de variable d'environnement pour Spring Boot
    # Ajoute d'autres configurations spécifiques au back-end, comme les bases de données, etc.
