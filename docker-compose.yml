services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ./POSTGRES/.env
    ports:
      - "5432:5432"
    volumes:
      - ./POSTGRES/data:/var/lib/postgresql/data
    networks:
      - batchcooking_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  back:
    build:
      context: ./BACK
    ports:
      - "8083:8083"
    env_file:
      - ./BACK/.env
    networks:
      - batchcooking_network
    depends_on:
      postgres:
        condition: service_healthy

  batch:
    build:
      context: ./BATCH
    ports:
      - "5001:5001"
    env_file:
      - ./BATCH/.env
    networks:
      - batchcooking_network
    depends_on:
      - back
      
  front:
    build:
      context: ./FRONT
    ports:
      - "5173:80"
    env_file:
      - ./FRONT/.env.production
    networks:
      - batchcooking_network
    depends_on:
      - back

networks:
  batchcooking_network:
    driver: bridge
